<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오톡 공유하기</title>
    <!-- CSS 스타일 문서 연결 -->
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Kakao JS SDK V2 로드 -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
      integrity="sha384-TiCmbV6AUn87243y//kXmD1aO+wZ0p87lS8Z1JtIf2+H11bJ7V1S/0s2eEMmI1rR"
      crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>이벤트 소식 공유하기 🚀</h1>
        <p>친구들에게 이벤트를 공유해보세요!</p>
        
        <!-- 방식 A: 카카오 공유 버튼 (createDefaultButton 방식 적용 대상) -->
        <a id="kakaotalk-sharing-btn" href="javascript:;">
          <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png"
            alt="카카오톡 공유 보내기 버튼" />
        </a>

        <!-- 방식 B: 사용자 정의 커스텀 버튼 (sendDefault 방식 예시용) -->
        <button id="custom-kakao-btn" class="custom-btn" onclick="shareMessage()">
            🎯 커스텀 버튼으로 공유하기
        </button>
    </div>

    <!-- JS 공유 로직 연결 -->
    <script src="./js/kakao-share.js"></script>
</body>
</html>
